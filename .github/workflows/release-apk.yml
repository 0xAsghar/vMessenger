name: Release APK

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - gradle/version.properties
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read app version
        id: version
        run: |
          VERSION_NAME=$(grep '^versionName=' gradle/version.properties | cut -d= -f2)
          VERSION_CODE=$(grep '^versionCode=' gradle/version.properties | cut -d= -f2)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release APKs (per ABI + universal)
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK artifacts
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          OUT="app/build/outputs/apk/release"
          mkdir -p dist
          for apk in "$OUT"/*.apk; do
            base=$(basename "$apk" .apk)
            case "$base" in
              app-universal-release)
                cp "$apk" "dist/vMessenger-${VERSION}-universal.apk"
                ;;
              app-*-release)
                abi="${base#app-}"
                abi="${abi%-release}"
                cp "$apk" "dist/vMessenger-${VERSION}-${abi}.apk"
                ;;
            esac
          done
          ls -la dist/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmessenger-apks-${{ steps.version.outputs.name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: vMessenger ${{ steps.version.outputs.name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
